<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HYC Intro Period Explorer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: #ffffff;
    color: #1a1a2e;
    overflow: hidden;
    height: 100vh;
  }

  #header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 16px 28px 8px;
    background: linear-gradient(180deg, #ffffff 70%, transparent);
    pointer-events: none;
  }
  #header h1 {
    font-size: 20px; font-weight: 700; color: #1a1a2e;
    letter-spacing: -0.3px; pointer-events: auto;
  }
  #header p {
    font-size: 12px; color: #888; margin-top: 3px; pointer-events: auto;
  }

  /* Controls */
  #controls {
    position: fixed; top: 14px; right: 28px; z-index: 100;
    display: flex; gap: 8px; align-items: center;
  }

  .ctrl-btn {
    padding: 6px 14px; border-radius: 6px;
    border: 1px solid #e0e0e0;
    background: #fff;
    color: #555; font-family: 'Inter', sans-serif;
    font-size: 12px; font-weight: 500; cursor: pointer;
    transition: all 0.2s;
  }
  .ctrl-btn:hover {
    background: #f5f5f5; color: #1a1a2e; border-color: #ccc;
  }

  /* Tooltip */
  #tooltip {
    position: fixed;
    padding: 14px 18px;
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 10px;
    font-size: 13px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 200;
    max-width: 280px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }
  .tt-name { font-weight: 600; font-size: 14px; color: #1a1a2e; margin-bottom: 6px; }
  .tt-row { display: flex; justify-content: space-between; gap: 16px; padding: 2px 0; }
  .tt-label { color: #888; font-family: 'JetBrains Mono', monospace; font-size: 11px; }
  .tt-val { color: #1a1a2e; font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 500; }
  .tt-bar { margin-top: 6px; height: 4px; border-radius: 2px; background: #f0f0f0; overflow: hidden; }
  .tt-bar-fill { height: 100%; border-radius: 2px; }

  /* Split prompt */
  #select-prompt {
    position: fixed;
    padding: 16px 20px;
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 12px;
    z-index: 150;
    display: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    width: 320px;
  }
  #select-prompt .sp-title {
    font-size: 11px; color: #888;
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 12px;
  }
  .sp-option {
    padding: 10px 14px;
    border-radius: 8px;
    margin-bottom: 4px;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid transparent;
  }
  .sp-option-label {
    font-size: 14px;
    font-weight: 600;
    color: #1a1a2e;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sp-option-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .sp-option-desc {
    font-size: 11px;
    color: #888;
    margin-top: 4px;
    line-height: 1.5;
    display: none;
  }
  .sp-option:hover .sp-option-desc {
    display: block;
  }

  /* Tree */
  .node circle {
    stroke-width: 2px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .node circle:hover { filter: brightness(0.9); }

  .node text {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    fill: #1a1a2e;
    pointer-events: none;
  }
  .node .sublabel {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    fill: #888;
  }

  .link {
    fill: none;
    stroke-opacity: 0.3;
    transition: stroke-opacity 0.2s;
  }

  .node.selected circle {
    filter: drop-shadow(0 0 6px rgba(0,0,0,0.15));
  }

  .depth-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    fill: #ccc;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }
</style>
</head>

<div id="tooltip"></div>
<div id="select-prompt"></div>

const VARS = {"classes_during_intro": {"label": "Classes During Intro", "short": "Classes", "color": "#4361ee", "colorLight": "rgba(67,97,238,0.08)", "description": "How many classes did the customer attend in their first 14 days? This is the strongest predictor of conversion -- more classes during the trial period means a much higher chance of purchasing a membership.", "order": ["1 Class", "2 Classes", "3 Classes", "4 Classes", "5 Classes", "6+ Classes"]}, "class_type_grouped": {"label": "First Class Type", "short": "Class Type", "color": "#e5383b", "colorLight": "rgba(229,56,59,0.08)", "description": "What type of class did the customer attend first? Different class formats (Vinyasa, Bikram, Pilates) may attract different customer profiles with different likelihoods of converting.", "order": ["Hot Vinyasa 60", "Bikram", "Hot Pilates", "Warm Yin", "Other Hot", "Other"]}, "time_block": {"label": "Time of First Class", "short": "Time", "color": "#2dc653", "colorLight": "rgba(45,198,83,0.08)", "description": "What time of day was the customer's first class? Morning customers may have different commitment patterns than evening customers.", "order": ["Early Morning", "Mid-Morning", "Midday", "Afternoon", "Evening"]}, "first_class_dow": {"label": "Day of First Class", "short": "Day", "color": "#f77f00", "colorLight": "rgba(247,127,0,0.08)", "description": "What day of the week did the customer take their first class? Weekend starters vs weekday starters may show different conversion behavior.", "order": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"]}};

const width = window.innerWidth;
const height = window.innerHeight;

const svg = d3.select("#tree-svg").attr("width", width).attr("height", height);
const g = svg.append("g");

const zoom = d3.zoom().scaleExtent([0.2, 3]).on("zoom", e => g.attr("transform", e.transform));
svg.call(zoom);
svg.call(zoom.transform, d3.zoomIdentity.translate(120, height / 2).scale(0.9));

const tooltip = d3.select("#tooltip");
const treemap = d3.tree().nodeSize([42, 240]);

let nodeId = 0;
let selectedNode = null;

// Figure out the color for a node based on which variable created it
function nodeColor(d) {
  if (d.data.name === "Converted") return "#6c63ff";
  if (d.data.name === "Did Not Convert") return "#bbb";
  if (d.data.name === "All Customers") return "#1a1a2e";
  const varKey = d.data.splitVar;
  if (varKey && VARS[varKey]) return VARS[varKey].color;
  return "#1a1a2e";
}

function nodeColorLight(d) {
  if (d.data.name === "Converted") return "rgba(108,99,255,0.12)";
  if (d.data.name === "Did Not Convert") return "rgba(0,0,0,0.04)";
  const varKey = d.data.splitVar;
  if (varKey && VARS[varKey]) return VARS[varKey].colorLight;
  return "rgba(0,0,0,0.06)";
}

function nodeRadius(d) {
  return Math.max(6, Math.min(24, Math.sqrt(d.data.count) * 0.7));
}

function getAvailableVars(node) {
  return Object.keys(VARS).filter(k => !node.data.usedVars.includes(k));
}

// Build root
let root = d3.hierarchy(makeRoot());
root.x0 = 0; root.y0 = 0;

function makeRoot() {
  return {
    name: "All Customers",
    count: RAW.length,
    converted: RAW.filter(d => d.converted === 1).length,
    rate: +(RAW.filter(d => d.converted === 1).length / RAW.length * 100).toFixed(1),
    dataIndices: RAW.map((_, i) => i),
    usedVars: [],
    splitVar: null
  };
}

function splitNode(node, varKey) {
  const indices = node.data.dataIndices;
  const varMeta = VARS[varKey];
  const groups = {};

  indices.forEach(i => {
    const val = RAW[i][varKey];
    if (!groups[val]) groups[val] = [];
    groups[val].push(i);
  });

  const childrenData = varMeta.order
    .filter(v => groups[v] && groups[v].length > 0)
    .map(val => {
      const idxs = groups[val];
      const conv = idxs.filter(i => RAW[i].converted === 1).length;
      const newUsed = [...node.data.usedVars, varKey];
      const cd = {
        name: val,
        count: idxs.length,
        converted: conv,
        rate: +(conv / idxs.length * 100).toFixed(1),
        dataIndices: idxs,
        usedVars: newUsed,
        splitVar: varKey
      };
      return cd;
    });

  // Auto-add outcome leaves if all 4 vars used
  childrenData.forEach(cd => {
    if (cd.usedVars.length >= Object.keys(VARS).length) {
      cd._autoLeaves = [
        {
          name: "Converted", count: cd.converted, converted: cd.converted,
          rate: 100, dataIndices: cd.dataIndices.filter(i => RAW[i].converted === 1),
          usedVars: cd.usedVars, splitVar: "outcome", isLeaf: true
        },
        {
          name: "Did Not Convert", count: cd.count - cd.converted, converted: 0,
          rate: 0, dataIndices: cd.dataIndices.filter(i => RAW[i].converted === 0),
          usedVars: cd.usedVars, splitVar: "outcome", isLeaf: true
        }
      ].filter(c => c.count > 0);
    }
  });

  node.data.splitVar = node.data.splitVar || null; // parent keeps its own
  node.children = childrenData.map(cd => {
    const child = d3.hierarchy(cd);
    child.depth = node.depth + 1;
    child.parent = node;
    child.x0 = node.x0; child.y0 = node.y0;

    if (cd._autoLeaves) {
      child.children = cd._autoLeaves.map(lcd => {
        const leaf = d3.hierarchy(lcd);
        leaf.depth = child.depth + 1;
        leaf.parent = child;
        leaf.x0 = node.x0; leaf.y0 = node.y0;
        return leaf;
      });
    }
    return child;
  });

  update(node);
  hidePrompt();
  setTimeout(autoFit, 600);
}

function autoFit() {
  const nodes = root.descendants();
  if (nodes.length <= 1) return;
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  nodes.forEach(d => {
    if (d.x < minX) minX = d.x;
    if (d.x > maxX) maxX = d.x;
    if (d.y < minY) minY = d.y;
    if (d.y > maxY) maxY = d.y;
  });
  const treeW = maxY - minY + 350;
  const treeH = maxX - minX + 100;
  const scale = Math.min(width / treeW, height / treeH, 1.2) * 0.85;
  const tx = (width - treeW * scale) / 2 - minY * scale + 120;
  const ty = (height - treeH * scale) / 2 - minX * scale;
  svg.transition().duration(600).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

function update(source) {
  const treeData = treemap(root);
  const nodes = treeData.descendants();
  const links = treeData.links();
  nodes.forEach(d => { d.y = d.depth * 240; });

  // Links
  const link = g.selectAll("path.link").data(links, d => d.target.data.name + d.target.depth + (d.target.parent ? d.target.parent.data.name : ""));

  const linkEnter = link.enter().insert("path", "g")
    .attr("class", "link")
    .attr("d", () => { const o = {x: source.x0||0, y: source.y0||0}; return diagonal(o,o); });

  linkEnter.merge(link).transition().duration(500)
    .attr("d", d => diagonal(d.source, d.target))
    .style("stroke", d => nodeColor(d.target))
    .style("stroke-width", d => Math.max(1.5, Math.min(10, Math.sqrt(d.target.data.count) * 0.5)))
    .style("stroke-opacity", 0.25);

  link.exit().transition().duration(300)
    .attr("d", () => { const o = {x: source.x||0, y: source.y||0}; return diagonal(o,o); }).remove();

  // Nodes
  const node = g.selectAll("g.node").data(nodes, d => d.data.name + d.depth + (d.parent ? d.parent.data.name : ""));

  const nodeEnter = node.enter().append("g")
    .attr("class", "node")
    .attr("transform", `translate(${source.y0||0},${source.x0||0})`)
    .on("click", (event, d) => onNodeClick(event, d))
    .on("mouseover", (event, d) => showTooltip(event, d))
    .on("mousemove", event => tooltip.style("left",(event.clientX+16)+"px").style("top",(event.clientY-10)+"px"))
    .on("mouseout", () => tooltip.style("opacity", 0));

  nodeEnter.append("circle").attr("r", 0)
    .style("fill", d => nodeColor(d))
    .style("stroke", d => nodeColor(d))
    .style("fill-opacity", 0.15)
    .style("stroke-opacity", 0.8);

  nodeEnter.append("text")
    .attr("dy", "-0.6em").attr("x", d => nodeRadius(d) + 8)
    .attr("text-anchor", "start").text(d => d.data.name)
    .style("font-weight", "600").style("fill-opacity", 0);

  nodeEnter.append("text").attr("class", "sublabel")
    .attr("dy", "0.8em").attr("x", d => nodeRadius(d) + 8)
    .attr("text-anchor", "start")
    .text(d => `${d.data.count.toLocaleString()} customers  |  ${d.data.rate}% conv`)
    .style("fill-opacity", 0);

  const nodeUpdate = nodeEnter.merge(node);
  nodeUpdate.transition().duration(500).attr("transform", d => `translate(${d.y},${d.x})`);

  nodeUpdate.select("circle").transition().duration(500)
    .attr("r", d => nodeRadius(d))
    .style("fill", d => nodeColor(d))
    .style("stroke", d => nodeColor(d))
    .style("fill-opacity", 0.15)
    .style("stroke-opacity", 0.8);

  nodeUpdate.selectAll("text").transition().duration(500)
    .style("fill-opacity", 1)
    .attr("x", d => nodeRadius(d) + 8);

  const nodeExit = node.exit().transition().duration(300)
    .attr("transform", `translate(${source.y||0},${source.x||0})`).remove();
  nodeExit.select("circle").attr("r", 0);
  nodeExit.selectAll("text").style("fill-opacity", 0);

  nodes.forEach(d => { d.x0 = d.x; d.y0 = d.y; });
  updateDepthLabels(nodes);
}

function updateDepthLabels(nodes) {
  const depthMap = {};
  nodes.forEach(d => { if (!depthMap[d.depth]) depthMap[d.depth] = { y: d.y, varKey: d.data.splitVar }; });
  let minX = Infinity;
  nodes.forEach(d => { if (d.x < minX) minX = d.x; });

  const labels = g.selectAll("text.depth-label").data(Object.entries(depthMap), d => d[0]);
  labels.enter().append("text").attr("class", "depth-label")
    .merge(labels).transition().duration(500)
    .attr("x", d => d[1].y).attr("y", minX - 40)
    .text(d => {
      if (d[0] === "0") return "ALL";
      const vk = d[1].varKey;
      if (vk === "outcome") return "OUTCOME";
      return vk && VARS[vk] ? VARS[vk].short.toUpperCase() : "";
    })
    .style("fill", d => {
      const vk = d[1].varKey;
      if (vk && VARS[vk]) return VARS[vk].color;
      return "#ccc";
    })
    .style("fill-opacity", 0.5);
  labels.exit().remove();
}

function onNodeClick(event, d) {
  event.stopPropagation();
  hidePrompt();
  if (d.data.isLeaf) return;

  if (d.children && d.depth > 0) {
    collapseNode(d);
    update(d);
    selectedNode = null;
    setTimeout(autoFit, 600);
    return;
  }

  if (!d.children) {
    const available = getAvailableVars(d);
    if (available.length === 0) return;
    selectedNode = d;
    g.selectAll("g.node").classed("selected", false);
    d3.select(event.currentTarget).classed("selected", true);
    showSplitPrompt(event, d, available);
  }
}

function showSplitPrompt(event, node, available) {
  const sp = document.getElementById("select-prompt");
  sp.innerHTML = '<div class="sp-title">Split this group by...</div>';

  available.forEach(varKey => {
    const vm = VARS[varKey];
    const opt = document.createElement("div");
    opt.className = "sp-option";
    opt.style.cssText = `--hover-bg: ${vm.colorLight}`;
    opt.onmouseenter = () => { opt.style.background = vm.colorLight; opt.style.borderColor = vm.color + '33'; };
    opt.onmouseleave = () => { opt.style.background = 'transparent'; opt.style.borderColor = 'transparent'; };

    opt.innerHTML = `
      <div class="sp-option-label">
        <div class="sp-option-dot" style="background:${vm.color}"></div>
        ${vm.label}
      </div>
      <div class="sp-option-desc">${vm.description}</div>
    `;
    opt.onclick = (e) => {
      e.stopPropagation();
      splitNode(node, varKey);
      g.selectAll("g.node").classed("selected", false);
    };
    sp.appendChild(opt);
  });

  sp.style.display = "block";

  // Position: try to keep on screen
  let left = event.clientX + 20;
  let top = event.clientY - 20;
  if (left + 320 > window.innerWidth) left = event.clientX - 340;
  if (top + 300 > window.innerHeight) top = window.innerHeight - 320;
  sp.style.left = left + "px";
  sp.style.top = Math.max(10, top) + "px";
}

function hidePrompt() {
  document.getElementById("select-prompt").style.display = "none";
}

function collapseNode(d) {
  if (d.children) {
    d.children.forEach(c => collapseNode(c));
    d.children = null;
  }
}

function showTooltip(event, d) {
  const data = d.data;
  const c = nodeColor(d);
  let html = `<div class="tt-name" style="color:${c}">${data.name}</div>`;
  html += `<div class="tt-row"><span class="tt-label">Customers</span><span class="tt-val">${data.count.toLocaleString()}</span></div>`;
  html += `<div class="tt-row"><span class="tt-label">Converted</span><span class="tt-val">${data.converted.toLocaleString()}</span></div>`;
  html += `<div class="tt-row"><span class="tt-label">Conv Rate</span><span class="tt-val">${data.rate}%</span></div>`;
  html += `<div class="tt-row"><span class="tt-label">% of Total</span><span class="tt-val">${(data.count / RAW.length * 100).toFixed(1)}%</span></div>`;

  if (!data.isLeaf && !d.children) {
    const avail = getAvailableVars(d);
    if (avail.length > 0) {
      html += `<div class="tt-row"><span class="tt-label" style="color:${c}">Click to split (${avail.length} vars left)</span></div>`;
    }
  }
  if (d.children && d.depth > 0) {
    html += `<div class="tt-row"><span class="tt-label" style="color:#888">Click to collapse</span></div>`;
  }

  html += `<div class="tt-bar"><div class="tt-bar-fill" style="width:${data.rate}%;background:${c}"></div></div>`;
  tooltip.html(html).style("opacity", 1)
    .style("left",(event.clientX+16)+"px").style("top",(event.clientY-10)+"px");
}

function diagonal(s, d) {
  return `M ${s.y} ${s.x} C ${(s.y+d.y)/2} ${s.x}, ${(s.y+d.y)/2} ${d.x}, ${d.y} ${d.x}`;
}

function resetTree() {
  root = d3.hierarchy(makeRoot());
  root.x0 = 0; root.y0 = 0;
  selectedNode = null;
  g.selectAll("*").remove();
  update(root);
  hidePrompt();
  svg.transition().duration(600).call(zoom.transform, d3.zoomIdentity.translate(120, height/2).scale(0.9));
}

function resetZoom() { autoFit(); }

svg.on("click", () => { hidePrompt(); g.selectAll("g.node").classed("selected", false); });
update(root);
window.addEventListener("resize", () => { svg.attr("width", window.innerWidth).attr("height", window.innerHeight); });
</script>
</body>
